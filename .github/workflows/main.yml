name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.pair.os }}
    strategy:
      fail-fast: false
      matrix:
        pair:
          - erlang: master
            rebar3: 3.25.0
            os: ubuntu-24.04

          - erlang: 28
            rebar3: 3.25.0
            os: ubuntu-24.04
            lint: true

          - erlang: 27
            rebar3: 3.23.0
            os: ubuntu-22.04

          - erlang: 26
            rebar3: 3.21.0
            os: ubuntu-22.04

          - erlang: 25
            rebar3: 3.21.0
            os: ubuntu-22.04

          - erlang: 24
            rebar3: 3.21.0
            os: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4 # v1.21.0
        with:
          otp-version: ${{ matrix.pair.erlang }}
          rebar3-version: ${{ matrix.pair.rebar3 }}

      - run: rebar3 ct
      - run: rebar3 as test proper
      - run: rm src/safe_erl_term.erl && rebar3 fmt --check
        if: ${{ matrix.pair.lint }}
