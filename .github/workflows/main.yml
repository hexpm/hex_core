name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.pair.os }}
    strategy:
      fail-fast: false
      matrix:
        pair:
          - erlang: master
            rebar3: 3.25.0
            os: ubuntu-24.04

          - erlang: 28
            rebar3: 3.25.0
            os: ubuntu-24.04
            lint: true

          - erlang: 27
            rebar3: 3.23.0
            os: ubuntu-22.04

          - erlang: 26
            rebar3: 3.21.0
            os: ubuntu-22.04

          - erlang: 25
            rebar3: 3.21.0
            os: ubuntu-22.04

          - erlang: 24
            rebar3: 3.21.0
            os: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ matrix.pair.erlang }}
          rebar3-version: ${{ matrix.pair.rebar3 }}

      - run: rebar3 ct
      - run: rebar3 as test proper
      - run: rebar3 fmt --check
        if: ${{ matrix.pair.lint }}
