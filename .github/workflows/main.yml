name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.pair.os }}
    strategy:
      fail-fast: false
      matrix:
        pair:
          - erlang: master
            rebar3: 3.25.0
            os: ubuntu-24.04

          - erlang: 28
            rebar3: 3.25.0
            os: ubuntu-24.04
            lint: true

          - erlang: 27
            rebar3: 3.23.0
            os: ubuntu-22.04

          - erlang: 26
            rebar3: 3.21.0
            os: ubuntu-22.04

          - erlang: 25
            rebar3: 3.21.0
            os: ubuntu-22.04

          - erlang: 24
            rebar3: 3.21.0
            os: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: ${{ matrix.pair.erlang }}
          rebar3-version: ${{ matrix.pair.rebar3 }}

      - run: rebar3 ct
      - run: rebar3 as test proper
      - run: rebar3 fmt --check
        if: ${{ matrix.pair.lint }}
